<div>
    <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <span class="result-title" style="font-weight: 700; color: #fff; font-size: 1.1rem;">Analisis Deteksi Objek (YOLOv8)</span>
        <span class="result-badge badge-success" style="background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; font-size: 0.75rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">Selesai</span>
    </div>
    
    <div class="details-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px;">
        <div style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04); text-align: center;">
            <div style="font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase;">Pemain</div>
            <div style="font-size: 1.15rem; font-weight: 800; color: #00E5FF;" id="val-players-{{ suffix }}">{{ player_count }}</div>
        </div>
        <div style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04); text-align: center;">
            <div style="font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase;">Bola</div>
            <div style="font-size: 1.15rem; font-weight: 800; color: #C8FF00;" id="val-ball-{{ suffix }}">{{ ball_count }}</div>
        </div>
        <div style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04); text-align: center;">
            <div style="font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase;">Kiper</div>
            <div style="font-size: 1.15rem; font-weight: 800; color: #FF9500;" id="val-keeper-{{ suffix }}">{{ goalkeeper_count }}</div>
        </div>
        <div style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04); text-align: center;">
            <div style="font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase;">Wasit</div>
            <div style="font-size: 1.15rem; font-weight: 800; color: #FF2D55;" id="val-refs-{{ suffix }}">{{ referee_count }}</div>
        </div>
        <div style="background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04); text-align: center; grid-column: span 4;">
            <span style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">TOTAL DETEKSI:</span>
            <strong style="color: #fff; font-size: 1rem; margin-left: 5px;" id="val-total-{{ suffix }}">{{ total_count }}</strong>
        </div>
    </div>
    
    <div class="processed-media" style="position: relative; border-radius: 12px; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.1); margin-bottom: 12px; background: #000;">
        <img src="{{ image_url }}" style="width: 100%; display: block; max-height: 280px; object-fit: contain;">
    </div>
    
    <div style="margin-top: 15px;">
        <p style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">▸ PETA POSISI TAKTIS (SCATTER MAP)</p>
        <div class="field-container" style="background: rgba(0,0,0,0.2); border: 1.5px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 10px; position: relative;">
            <div class="soccer-field" id="field-{{ suffix }}" style="position: relative; width: 100%; height: 180px; background: #166534; border: 2px solid #fff; border-radius: 8px; overflow: hidden;">
                <div class="field-center-line" style="position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: rgba(255,255,255,0.5);"></div>
                <div class="field-center-circle" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%;"></div>
                <div class="field-center-dot" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; background: rgba(255,255,255,0.8); border-radius: 50%;"></div>
                <div class="field-box-left" style="position: absolute; top: 25%; left: 0; width: 15%; height: 50%; border: 2px solid rgba(255,255,255,0.5); border-left: none;"></div>
                <div class="field-box-right" style="position: absolute; top: 25%; right: 0; width: 15%; height: 50%; border: 2px solid rgba(255,255,255,0.5); border-right: none;"></div>
                <!-- Heatmap/Scatter dots will be dynamically generated by JS -->
            </div>
            <div class="field-legend" style="display: flex; justify-content: center; gap: 15px; margin-top: 8px; flex-wrap: wrap; font-size: 0.72rem;">
                <div class="legend-item" style="display: flex; align-items: center; gap: 4px;"><div class="legend-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #00E5FF; box-shadow: 0 0 6px #00E5FF;"></div> Pemain</div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 4px;"><div class="legend-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #C8FF00; box-shadow: 0 0 6px #C8FF00;"></div> Bola</div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 4px;"><div class="legend-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #FF9500; box-shadow: 0 0 6px #FF9500;"></div> Kiper</div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 4px;"><div class="legend-dot" style="width: 8px; height: 8px; border-radius: 50%; background: #FF2D55; box-shadow: 0 0 6px #FF2D55;"></div> Wasit</div>
            </div>
        </div>
    </div>
    
    <div style="margin-top: 15px;">
        <p style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">▸ DISTRIBUSI DETEKSI OBJEK</p>
        <div class="chart-container-inner" style="height: 140px; position: relative; width: 100%;">
            <canvas id="chart-{{ suffix }}"></canvas>
        </div>
    </div>
</div>
