<div class="flask-result" style="margin-top: 1rem; display: flex; align-items: center; gap: 16px; padding: 1.5rem; border-radius: 16px; animation: fadeUp 0.35s ease;
    {% if is_high_risk %}
    background: rgba(220, 38, 38, 0.08); border: 1.5px solid rgba(220, 38, 38, 0.25);
    {% else %}
    background: rgba(22, 163, 74, 0.08); border: 1.5px solid rgba(22, 163, 74, 0.25);
    {% endif %}">
    
    <div class="flask-result-icon" style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        {% if is_high_risk %}
        background: rgba(220, 38, 38, 0.15); color: #dc2626;
        {% else %}
        background: rgba(22, 163, 74, 0.15); color: #16a34a;
        {% endif %}">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
    </div>
    
    <div style="flex: 1;">
        <div class="flask-result-text" style="font-size: 1.15rem; font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;
            {% if is_high_risk %}
            color: #ef4444;
            {% else %}
            color: #10b981;
            {% endif %}">
            {{ prediction_text }}
        </div>
        <div class="flask-result-sub" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">
            Hasil analisis model sekuensial LSTM (Kel_4)
        </div>
    </div>
</div>
