<div>
    <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <span class="result-title" style="font-weight: 700; color: #fff; font-size: 1.1rem;">Hasil Evaluasi Risiko Cedera</span>
        {% if prob_percent >= 50 %}
        <span class="result-badge badge-danger" style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; font-size: 0.75rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">{{ risk_status }}</span>
        {% else %}
        <span class="result-badge badge-success" style="background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; font-size: 0.75rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">{{ risk_status }}</span>
        {% endif %}
    </div>
    
    <div style="margin-bottom: 1.25rem; text-align: center;">
        <div style="font-size: 2.5rem; font-weight: 850; color: {% if prob_percent >= 50 %}#ef4444{% else %}#10b981{% endif %}; font-family: 'Barlow Condensed', sans-serif;">
            {{ prob_percent }}%
        </div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.2rem;">Probabilitas Potensi Kerawanan Fisik</p>
        <div style="width: 100%; height: 8px; background: rgba(255, 255, 255, 0.08); border-radius: 10px; overflow: hidden; margin-top: 0.5rem;">
            <div style="width: {{ prob_percent }}%; height: 100%; background: {% if prob_percent >= 50 %}#ef4444{% else %}#10b981{% endif %}; border-radius: 10px; transition: width 0.8s;"></div>
        </div>
    </div>
    
    <div style="font-size: 0.88rem; line-height: 1.5; border-left: 3px solid {% if prob_percent >= 50 %}#ef4444{% else %}#10b981{% endif %}; padding-left: 10px; background: rgba(255,255,255,0.02); padding-top: 8px; padding-bottom: 8px; border-radius: 0 8px 8px 0;">
        <strong style="color: {% if prob_percent >= 50 %}#ef4444{% else %}#10b981{% endif %};">Rekomendasi Medis:</strong>
        <p style="color: var(--text-secondary); margin-top: 4px;">{{ recommendation }}</p>
    </div>
    <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; text-align: right;">
        Model: ANN Classifier (Kel_6) &middot; {{ timestamp }}
    </div>
</div>
