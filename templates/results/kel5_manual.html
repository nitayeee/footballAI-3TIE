<div class="result-card animated" style="background: rgba(59, 130, 246, 0.08); border: 1.5px solid rgba(59, 130, 246, 0.25); border-radius: 16px; padding: 1.5rem; margin-top: 1rem; animation: fadeUp 0.35s ease;">
    <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span class="result-title" style="font-weight: 700; color: #fff; font-size: 1.05rem;">Hasil Prediksi Rating</span>
        <span class="result-badge badge-primary" style="background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: var(--primary); font-size: 0.72rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">{{ category }}</span>
    </div>
    
    <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 15px;">
        <div style="width: 76px; height: 76px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 20px rgba(59, 130, 246, 0.35);">
            <span style="font-size: 2.2rem; font-weight: 900; color: #fff; font-family: 'Barlow Condensed', sans-serif;">{{ rating }}</span>
        </div>
        <div>
            <div style="font-weight: 700; color: #fff; font-size: 1rem;">{{ desc }}</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px;">Prediksi model LSTM berdasarkan statistik manual</div>
        </div>
    </div>
    
    <div class="details-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-bottom: 10px;">
        <div style="background: rgba(255,255,255,0.01); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.03);">
            <div style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Posisi Ideal</div>
            <div style="font-size: 0.82rem; font-weight: 700; color: #fff; margin-top: 2px;">{{ insights.best_position }}</div>
        </div>
        <div style="background: rgba(255,255,255,0.01); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.03);">
            <div style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Prospek Karir</div>
            <div style="font-size: 0.82rem; font-weight: 700; color: #fff; margin-top: 2px;">{{ insights.potential[:20] }}...</div>
        </div>
    </div>
    
    <div style="font-size: 0.85rem; border-left: 3px solid var(--accent); padding-left: 10px; background: rgba(255,255,255,0.02); padding-top: 6px; padding-bottom: 6px; border-radius: 0 6px 6px 0;">
        <strong style="color: var(--accent);">Latihan Direkomendasikan:</strong> <span style="color: var(--text-secondary);">{{ insights.training_needs }}</span>
    </div>
</div>
