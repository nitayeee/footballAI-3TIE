<div>
    <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <span class="result-title" style="font-weight: 700; color: var(--text-primary); font-size: 1.1rem;">Klasifikasi Momen Lapangan (MobileNetV2)</span>
        <span class="result-badge badge-primary" style="background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: var(--primary); font-size: 0.75rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">{{ event|upper|replace('_', ' ') }}</span>
    </div>
    
    <div class="processed-media" style="position: relative; border-radius: 12px; overflow: hidden; border: 1.5px solid rgba(0,0,0,0.1); margin-bottom: 15px; background: #000;">
        <img src="{{ image_url }}" style="width: 100%; display: block; max-height: 280px; object-fit: contain;" alt="Soccer Event MobileNetV2 Analysis">
    </div>
    
    <div style="margin-bottom: 1.25rem; text-align: center; background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05); padding: 12px; border-radius: 12px;">
        <div style="font-size: 2.2rem; font-weight: 900; color: var(--primary); font-family: 'Barlow Condensed', sans-serif; line-height: 1;">
            {{ confidence }}%
        </div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.2rem;">Tingkat Keyakinan (Confidence Level)</p>
    </div>
    
    <div style="margin-top: 15px;">
        <p style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">▸ DISTRIBUSI PROBABILITAS (CHART.JS)</p>
        <div class="chart-container-inner" style="height: 160px; position: relative; width: 100%;">
            <canvas id="chart-{{ suffix }}"></canvas>
        </div>
    </div>
    <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; text-align: right;">
        Model: MobileNetV2
    </div>
</div>
