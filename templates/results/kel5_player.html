<div class="result-card animated" style="background: rgba(59, 130, 246, 0.08); border: 1.5px solid rgba(59, 130, 246, 0.25); border-radius: 16px; padding: 1.5rem; margin-top: 1rem; animation: fadeUp 0.35s ease;">
    <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span class="result-title" style="font-weight: 700; color: var(--text-primary); font-size: 1.05rem;">Proyeksi Karir: {{ player_name }}</span>
        <span class="result-badge badge-primary" style="background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: var(--primary); font-size: 0.72rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">{{ category }}</span>
    </div>
    
    <div class="details-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px;">
        <div style="background: var(--bg-primary); padding: 8px; border-radius: 6px; border: 1px solid var(--border-glass); text-align: center;">
            <div style="font-size: 0.62rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Posisi Ideal</div>
            <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-primary); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ insights.best_position }}</div>
        </div>
        <div style="background: var(--bg-primary); padding: 8px; border-radius: 6px; border: 1px solid var(--border-glass); text-align: center;">
            <div style="font-size: 0.62rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Rating Saat Ini</div>
            <div style="font-size: 1rem; font-weight: 800; color: var(--text-primary); margin-top: 2px;">{{ actual_ratings[-1] }}</div>
        </div>
        <div style="background: var(--bg-primary); padding: 8px; border-radius: 6px; border: 1px solid var(--border-glass); text-align: center;">
            <div style="font-size: 0.62rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Rating Potensial</div>
            <div style="font-size: 1rem; font-weight: 800; color: var(--accent); margin-top: 2px;">{{ pred_ratings[-1] }}</div>
        </div>
    </div>
    
    <div style="font-size: 0.85rem; border-left: 3px solid var(--accent); padding-left: 10px; background: rgba(0,0,0,0.01); padding-top: 6px; padding-bottom: 6px; border-radius: 0 6px 6px 0; margin-bottom: 12px;">
        <strong style="color: var(--accent);">Rekomendasi Latihan:</strong> <span style="color: var(--text-secondary);">{{ insights.training_needs }}</span>
    </div>
    
    <div style="margin-top: 15px;">
        <p style="font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">▸ GRAFIK HISTORIS & PROYEKSI KARIR (5 TAHUN)</p>
        <div class="chart-container-inner" style="height: 180px; position: relative; width: 100%;">
            <canvas id="chart-{{ chart_id }}"></canvas>
        </div>
    </div>
</div>
