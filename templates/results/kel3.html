<div>
    <div class="result-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <span class="result-title" style="font-weight: 700; color: #fff; font-size: 1.1rem;">Hasil Analisis Pose Latihan</span>
        <span class="result-badge badge-success" style="background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; font-size: 0.75rem; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; font-weight: 700;">Complete</span>
    </div>
    
    <div class="details-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem;">
        <div class="detail-item" style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center; grid-column: span 2;">
            <div style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 4px;">LATIHAN TERDETEKSI</div>
            <div style="font-size: 1.25rem; font-weight: 800; color: var(--primary); text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif;">{{ exercise|upper }}</div>
        </div>
        <div class="detail-item" style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
            <div style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 4px;">TOTAL REPETISI</div>
            <div style="font-size: 2.2rem; font-weight: 800; color: var(--accent); font-family: 'Barlow Condensed', sans-serif; line-height: 1;">{{ reps }}</div>
        </div>
        <div class="detail-item" style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
            <div style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 4px;">CONFIDENCE</div>
            <div style="font-size: 2.2rem; font-weight: 800; color: #fff; font-family: 'Barlow Condensed', sans-serif; line-height: 1;">{{ confidence }}%</div>
        </div>
        <div class="detail-item" style="background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); text-align: center; grid-column: span 2;">
            <div style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 4px;">FEEDBACK FORM</div>
            <div style="font-size: 1rem; font-weight: 700; color: {% if feedback == 'Good' %}#10b981{% else %}#f59e0b{% endif %};">{{ feedback }}</div>
        </div>
    </div>
    
    <div class="processed-media" style="position: relative; border-radius: 12px; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.1); margin-top: 10px; background: #000;">
        <video src="{{ processed_video_url }}" style="width: 100%; display: block; max-height: 300px; object-fit: contain;" controls autoplay loop muted></video>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.72rem; color: var(--text-secondary); margin-top: 6px; padding: 0 4px;">
        <span>Model: YOLOv8 Pose + Action CNN</span>
        <span>Frames: {{ total_frames_processed }}</span>
    </div>
</div>
