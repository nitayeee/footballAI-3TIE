<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sports Assistant - SportsIntellect</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Chart.js CDN for interactive visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="chat-layout">
        <!-- CHAT SIDEBAR (HISTORY PANEL) -->
        <aside class="chat-sidebar" id="chat-sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    <span>Percakapan Baru</span>
                </button>
            </div>
            <div class="rooms-list" id="rooms-list">
                <!-- Populated dynamically by chat.js -->
            </div>
        </aside>

        <!-- MAIN CHAT CONTAINER -->
        <div class="chat-container">
            <!-- CHAT HEADER -->
            <header class="chat-header glass">
                <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" aria-label="Toggle Sidebar">
                    <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                
                <a href="/" class="back-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Kembali ke Beranda
                </a>
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #3b82f6;"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/><path d="M12 2a6 6 0 0 0-6 6v1c0 2.2 1.8 4 4 4h4c2.2 0 4-1.8 4-4V8a6 6 0 0 0-6-6z"/></svg>
                    <span>SportsIntellect</span>
                </div>
                <div class="header-spacer"></div> <!-- Spacer for balanced alignment -->
            </header>

            <!-- CHAT HISTORY VIEW -->
            <main class="chat-history" id="chat-history">
                <!-- Chat bubbles are dynamically populated by chat.js -->
            </main>

            <!-- CHAT FOOTER ACTIONS -->
            <footer class="chat-footer glass">
                <button class="restart-chat-btn" id="restart-btn">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5"/></svg>
                    Reset Percakapan
                </button>
            </footer>
        </div>
    </div>

    <!-- Frontend logic controller -->
    <script src="/static/js/chat.js"></script>
</body>
</html>
